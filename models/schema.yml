version: 2

sources:
  - name: raw
    schema: gz_raw_data
    #loaded_at_field: "CAST(date_date AS TIMESTAMP)"
    #freshness:
      #warn_after:
        #count: 90
        #period: day
    tables:
      - name: sales
        identifier: raw_gz_sales
        description: >
          sales of Greenweez / we have one row per product_id 
          found in each orders_id
        columns:
          - name: "(orders_id || '-' || pdt_id)"
            description: "Composite key for uniqueness test"
            tests:
              - unique
              - not_null
          - name: date_date
          - name: orders_id
          - name: pdt_id
          - name: revenue
          - name: quantity

      - name: product
        identifier: raw_gz_product
        columns:
          - name: products_id
            tests:
              - unique
              - not_null

      - name: ship
        identifier: raw_gz_ship
        columns:
          - name: orders_id
            tests:
              - unique
              - not_null