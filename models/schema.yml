version: 2

sources:
  - name: raw
    schema: gz_raw_data
    tables:
      - name: sales
        identifier: raw_gz_sales
        description: >
          sales of Greenweez / we have one row per product_id 
          found in each orders_id
        columns:
          - name: "(orders_id || '-' || pdt_id)"
            description: "Composite key for uniqueness test"
            tests:
              - unique
              - not_null

          - name: date_date
            description: date of purchase
          - name: orders_id
            description: foreign key to ship
          - name: pdt_id
            description: foreign key to product
          - name: revenue
            description: revenue = quantity * selling_price
          - name: quantity
            description: the quantity of products purchased

      - name: product
        identifier: raw_gz_product
        columns:
          - name: products_id
            tests:
              - unique
              - not_null

      - name: ship
        identifier: raw_gz_ship
        columns:
          - name: orders_id
            tests:
              - unique
              - not_null