version: 2

sources:
  - name: raw
    schema: gz_raw_data
    tables:
      - name: sales
        identifier: raw_gz_sales
        description: >
          sales of Greenweez / we have one row per product_id 
          found in each orders_id
        columns:
          - name: "(orders_id || '-' || pdt_id)"
            description: "Composite key for uniqueness test"
            tests:
              - unique
              - not_null
          - name: date_date
          - name: orders_id
          - name: pdt_id
          - name: revenue
          - name: quantity

      - name: product
        identifier: raw_gz_product
        columns:
          - name: products_id
            tests:
              - unique
              - not_null

      - name: raw_adwords
        identifier: raw_gz_adwords
        description: "Raw Google Adwords advertising data"
        columns:
          - name: date_date
          - name: paid_source
          - name: campaign_key
          - name: campgn_name
          - name: ads_cost
          - name: impression
          - name: click

      - name: raw_bing
        identifier: raw_gz_bing
        description: "Raw Bing advertising data"
        columns:
          - name: date_date
          - name: paid_source
          - name: campaign_key
          - name: campgn_name
          - name: ads_cost
          - name: impression
          - name: click

      - name: raw_criteo
        identifier: raw_gz_criteo
        description: "Raw Criteo advertising data"
        columns:
          - name: date_date
          - name: paid_source
          - name: campaign_key
          - name: campgn_name
          - name: ads_cost
          - name: impression
          - name: click

      - name: raw_facebook
        identifier: raw_gz_facebook
        description: "Raw Facebook advertising data"
        columns:
          - name: date_date
          - name: paid_source
          - name: campaign_key
          - name: campgn_name
          - name: ads_cost
          - name: impression
          - name: click

      - name: ship
        identifier: raw_gz_ship
        columns:
          - name: orders_id
            tests:
              - unique
              - not_null

models:
  # ==========================================
  # INTERMEDIATE MODELS
  # ==========================================

  - name: int_campaigns
    description: "Union of all marketing ad platform staging models (Adwords, Bing, Criteo, Facebook)."
    columns:
      - name: date_date
        description: "Date of the ad"
        tests:
          - not_null
      - name: paid_source
        description: "Advertising platform source (adwords, bing, criteo, facebook)"
        tests:
          - not_null
      - name: campaign_key
        description: "Unique key of the campaign"
        tests:
          - not_null
      - name: campaign_name
        description: "Name of the campaign"
      - name: ads_cost
        description: "Cost of the ads, cast as float64"
      - name: impression
        description: "Number of impressions"
      - name: click
        description: "Number of clicks"

  - name: int_campaigns_day
    description: "Daily aggregation of ads cost, impressions and clicks across all campaigns."
    columns:
      - name: date_date
        description: "Date of aggregation - Primary key"
        tests:
          - unique
          - not_null
      - name: ads_cost
        description: "Total ads cost for the day, rounded to 1 decimal"
        tests:
          - not_null
      - name: ads_impression
        description: "Total number of impressions for the day"

      - name: ads_clicks
        description: "Total number of clicks for the day"

  - name: int_orders_margin
    description: "Margin calculation aggregated per order."
    columns:
      - name: orders_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: margin
        description: "Margin = revenue - purchase_cost"
        tests:
          - not_null
      - name: Purchase_cost
        description: "Purchase_cost = quantity * purchase_price"
        tests:
          - not_null
      - name: date_date
        description: "Date of the order"
        tests:
          - not_null
      - name: revenue
        description: "Sum of revenue per order"
        tests:
          - not_null
      - name: quantity
        description: "Sum of quantity per order"
        tests:
          - not_null

  - name: int_sales_margin
    description: "Margin calculation per order line / product sales."
    tests:
      - unique:
          column_name: "(orders_id || '-' || products_id)"
    columns:
      - name: orders_id
        description: "Orders key"
        tests:
          - not_null
      - name: products_id
        description: "Products key"
        tests:
          - not_null
      - name: margin
        description: "Margin = revenue - purchase_cost"
        tests:
          - not_null
      - name: Purchase_cost
        description: "Purchase_cost = quantity * purchase_price"
        tests:
          - not_null
      - name: date_date
        description: "Date of the order"
        tests:
          - not_null
      - name: revenue
        description: "Sum of revenue per order"
        tests:
          - not_null
      - name: quantity
        description: "Sum of quantity per order"
        tests:
          - not_null

  - name: int_orders_operational
    description: "Operational margin calculation per order (including logistics and shipping)."
    columns:
      - name: orders_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: date_date
        description: "Date of the order"
        tests:
          - not_null
      - name: operational_margin
        description: "operational_margin = margin + shipping_fee - log_cost - ship_cost"
      - name: quantity
        description: "Sum of quantity per order"
        tests:
          - not_null
      - name: revenue
        description: "Sum of revenue per order"
        tests:
          - not_null
      - name: purchase_cost
        description: "Purchase_cost = quantity * purchase_price"
        tests:
          - not_null
      - name: margin
        description: "Margin = revenue - purchase_cost"
        tests:
          - not_null
      - name: shipping_fee
        description: "The price the customer pays for shipping"
      - name: log_cost
        description: "The cost of preparing the parcel in the warehouse"
      - name: ship_cost
        description: "Shipping cost paid by the company to the carrier"

  # ==========================================
  # MART MODELS
  # ==========================================

  - name: finance_campaigns_day
    description: "Global KPIs per day combining operational and advertising metrics."
    columns:
      - name: date_date
        description: "Date - Primary key"
        tests:
          - unique
          - not_null
      - name: ads_margin
        description: "operational_margin - ads_cost"
        tests:
      - name: average_basket
        description: "Average basket cost for each day"
        tests:
  - name: finance_campaigns_month
    description: "Global KPIs aggregated by month, joining operational and advertising metrics."
    columns:
      - name: datemonth
        description: "Month of aggregation (date truncated to month) - Primary key"
        tests:
          - unique
          - not_null
      - name: ads_margin
        description: "operational_margin - ads_cost, summed per month"

      - name: average_basket
        description: "Average basket cost per month = SUM(revenue) / SUM(nb_transactions)"
        tests:

      - name: operational_margin
        description: "Sum of operational margin per month"

      - name: ads_cost
        description: "Sum of ads cost per month"

      - name: ads_impression
        description: "Sum of impressions per month"

      - name: ads_clicks
        description: "Sum of clicks per month"

      - name: quantity
        description: "Sum of quantity sold per month"

      - name: revenue
        description: "Sum of revenue per month"

      - name: purchase_cost
        description: "Sum of purchase cost per month"

      - name: margin
        description: "Sum of margin per month"
      - name: shipping_fee
        description: "Sum of shipping fees per month"
      - name: log_cost
        description: "Sum of logistics costs per month"
      - name: ship_cost
        description: "Sum of carrier shipping costs per month"